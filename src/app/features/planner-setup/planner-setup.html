<main class="layout">
  <app-planner-config-panel
    [gacModes]="gacModes"
    [leagues]="leagues"
    [selectedMode]="selectedMode()"
    [selectedLeague]="selectedLeague()"
    (modeChanged)="onModeSelected($event)"
    (leagueChanged)="onLeagueSelected($event)"
  ></app-planner-config-panel>

  <app-planner-defense-section
    [zoneCards]="zoneCards()"
    [zoneMiniNavCards]="zoneMiniNavCards()"
    (clearRequested)="clearDefenseAndAttackOptions()"
    (zoneScrollRequested)="scrollToZone($event)"
    (zoneCollapsedToggleRequested)="toggleZoneCollapsed($event)"
    (teamExpandRequested)="expandCollapsedTeam($event.zoneId, $event.slotIndex)"
    (defenseTeamChanged)="onDefenseTeamValueChanged($event)"
    (defenseDefeatedChanged)="onDefenseDefeatedValueChanged($event)"
    (slotAttackOptionAddRequested)="addSlotAttackOption($event.zoneId, $event.slotIndex)"
    (slotAttackOptionRemoveRequested)="
      removeSlotAttackOption($event.zoneId, $event.slotIndex, $event.optionIndex)
    "
    (slotAttackOptionDraftChanged)="onSlotAttackOptionDraftValueChanged($event)"
  ></app-planner-defense-section>

  <a class="home-link" href="#/">Back to Home</a>
</main>
